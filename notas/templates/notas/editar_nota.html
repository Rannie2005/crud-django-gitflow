{% extends 'notas/base.html' %}

{% block content %}
<h1>Editar Nota</h1>

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="id_titulo">Título:</label>
        {{ form.titulo }}
    </div>
    
    <div class="form-group">
        <label for="id_contenido">Contenido:</label>
        {{ form.contenido }}
    </div>
    
    <button type="submit" class="btn-guardar">Actualizar Nota</button>
    <a href="{% url 'lista_notas' %}" class="btn-cancelar">❌ Cancelar</a>
</form>
{% endblock %}
