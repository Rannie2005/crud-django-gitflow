{% extends 'notas/base.html' %}

{% block content %}
<div class="perfil-container">
    <div class="perfil-header">
        <div class="avatar">
            <i class="avatar-icon">👤</i>
        </div>
        <h1>Mi Perfil</h1>
        <p>Gestiona tu información personal</p>
    </div>
    
    <div class="perfil-stats">
        <div class="stat-card">
            <div class="stat-number">{{ notas_count }}</div>
            <div class="stat-label">Notas escritas</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">{{ usuario.date_joined|date:"d/m/Y" }}</div>
            <div class="stat-label">Miembro desde</div>
        </div>
    </div>
    
    <form method="post" class="perfil-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label>👤 Nombre de usuario</label>
            <input type="text" name="username" value="{{ usuario.username }}" required>
        </div>
        
        <div class="form-group">
            <label>📧 Correo electrónico</label>
            <input type="email" name="email" value="{{ usuario.email }}" required>
        </div>
        
        <div class="form-group">
            <label>📱 Teléfono</label>
            <input type="text" name="telefono" value="{{ usuario.perfil.telefono|default:'' }}" placeholder="Opcional">
        </div>
        
        <div class="form-group">
            <label>🔐 Contraseña</label>
            <a href="{% url 'cambiar_password' %}" class="btn-cambiar-password">Cambiar contraseña</a>
        </div>
        
        <button type="submit" class="btn-guardar">💾 Guardar cambios</button>
        <a href="{% url 'lista_notas' %}" class="btn-cancelar">❌ Cancelar</a>
    </form>
</div>

<style>
    .perfil-container {
        max-width: 600px;
        margin: 0 auto;
    }
    
    .perfil-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .avatar-icon {
        font-size: 80px;
        background: #007bff;
        color: white;
        width: 120px;
        height: 120px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 60px;
        margin-bottom: 20px;
    }
    
    .perfil-header h1 {
        color: #333;
        margin-bottom: 10px;
    }
    
    .perfil-header p {
        color: #666;
    }
    
    .perfil-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }
    
    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .stat-number {
        font-size: 28px;
        font-weight: bold;
        color: #007bff;
    }
    
    .stat-label {
        color: #666;
        margin-top: 5px;
    }
    
    .perfil-form {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .btn-cambiar-password {
        display: inline-block;
        background: #ffc107;
        color: #333;
        padding: 10px 15px;
        text-decoration: none;
        border-radius: 5px;
        margin-top: 5px;
    }
    
    .btn-cambiar-password:hover {
        background: #e0a800;
    }
</style>
{% endblock %}
